name: Auto Translate Posts

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install deepl

      - name: Get changed markdown files
        run: |
          # 변경된 파일 목록을 파일로 저장 (한글 파일명 안전하게 처리)
          git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'content/**/*.md' > /tmp/changed_files.txt
          echo "변경된 파일:"
          cat /tmp/changed_files.txt

      - name: Translate changed files
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          # 파일 목록을 한 줄씩 읽어서 처리 (한글 파일명 안전하게 처리)
          while IFS= read -r FILE || [ -n "$FILE" ]; do
            [ -z "$FILE" ] && continue

            # 이미 번역된 파일은 건너뜀
            if echo "$FILE" | grep -qE '\.(en|ja)\.md$'; then
              echo "⏭ 스킵 (번역 파일): $FILE"
              continue
            fi

            # 파일이 실제로 존재하는지 확인
            if [ ! -f "$FILE" ]; then
              echo "⚠ 파일 없음, 스킵: $FILE"
              continue
            fi

            echo "🌐 번역 중: $FILE"
            python translate_posts.py --api-key "$DEEPL_API_KEY" --file "$FILE" --force

          done < /tmp/changed_files.txt

      - name: Commit translated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "번역된 파일 없음 - 커밋 스킵"
          else
            git commit -m "auto: translate new posts [skip ci]"
            git push
          fi
