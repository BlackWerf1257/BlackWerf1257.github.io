# Zola 다국어 설정 - BlackWerf1257.github.io

# 1. 기본 사이트 정보
base_url = "https://BlackWerf1257.github.io/"
default_language = "ko" # 접속 시 기본 언어
theme = "goyo"

# 2. 전역 분류(Taxonomies) 설정
taxonomies = [
    { name = "tags", feed = false },
    { name = "categories", paginate_by = 10, feed = true },
]

# 3. 마크다운 및 빌드 설정
# 특정 언어(ja)에서 인덱스 생성 에러가 날 경우, 전역에서만 관리하거나 
# 필요시 false로 설정하여 빌드 에러를 방지합니다.
build_search_index = true
generate_sitemap = true

[markdown]
bottom_footnotes = true

[markdown.highlighting]
theme = "github-dark"

