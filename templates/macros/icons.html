{% macro icon(name, class="") %}
{% set file = "static/icons/" ~ name ~ ".svg" %}
{% set svg_data = load_data(path=file, format="plain", required=false) %}
{% if svg_data %}
<span class="icon {{ class }}" aria-hidden="true">
    {{ svg_data | safe }}
  </span>
{% else %}
<span class="icon {{ class }}" aria-hidden="true"
    style="-webkit-mask-image: url('{{ get_url(path='icons/' ~ name ~ '.svg') | safe }}'); mask-image: url('{{ get_url(path='icons/' ~ name ~ '.svg') | safe }}'); -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; background-color: currentColor; display: inline-block; width: 1em; height: 1em;"></span>
{% endif %}
{% endmacro %}
